<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="content">
<h2>Cart</h2>

<p>Your cart is empty</p>

<div id="cartItems"></div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem("cartItems")) || [];

cart.forEach(i => {
  document.body.innerHTML += i.name + " ₹" + (i.price + 50);
});
</script>

</body>
</html>
